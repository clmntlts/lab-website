code: "https://github.com/evasquez-lab/latent-neuro-vae"
abstract: >
  We propose a variational autoencoder framework for modeling neural population dynamics that
  respects the Poisson noise statistics of spike counts. Our model, NeuroVAE, learns smooth
  latent trajectories that capture both trial-average dynamics and single-trial variability.
  We benchmark NeuroVAE against existing methods on six publicly available neural datasets
  and demonstrate state-of-the-art performance on held-out log-likelihood and decoding accuracy.
