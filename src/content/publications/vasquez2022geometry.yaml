title: "Geometry of neural computation: from single neurons to population codes"
authors:
  - "E. Vasquez"
  - "A. Pouget"
year: 2022
venue: "Annual Review of Neuroscience"
venueShort: "Annu. Rev. Neurosci."
type: journal
doi: "10.1146/annurev-neuro-000000"
pdf: "/pdfs/vasquez2022geometry.pdf"
abstract: >
  This review synthesizes recent advances in understanding neural computation through a geometric
  lens. We survey how concepts from differential geometry, topology, and information geometry
  have illuminated the structure of neural representations and their computational properties.
  We discuss open questions at the intersection of geometry, learning theory, and systems neuroscience.
