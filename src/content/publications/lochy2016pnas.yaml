title: "Left cortical specialization for visual letter strings predicts rudimentary knowledge of letter-speech sound associations in preschoolers"
authors:
  - "Lochy, A."
  - "Van Reybroeck, M."
  - "Rossion, B."
year: 2016
venue: "Proceedings of the National Academy of Sciences"
venueShort: "PNAS"
type: journal
doi: "10.1073/pnas.1520366113"
keywords:
  - letter recognition
  - cortical specialization
  - preschool
  - neuroimaging
  - reading acquisition
categories:
  - Reading
  - Neuroimaging
featured: true
abstract: "Using EEG frequency-tagging, this study demonstrates that left-hemisphere cortical specialization for visual letter strings in preschoolers predicts their letter–speech sound knowledge, revealing early neural markers of reading readiness."
