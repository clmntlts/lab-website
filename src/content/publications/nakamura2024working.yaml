title: "Working memory as low-dimensional attractor dynamics in prefrontal cortex"
authors:
  - "K. Nakamura"
  - "E. Vasquez"
year: 2024
venue: "bioRxiv"
venueShort: "bioRxiv"
type: preprint
arxiv: "2403.00000"
doi: "10.1101/2024.03.00.000000"
pdf: "/pdfs/nakamura2024working.pdf"
code: "https://github.com/evasquez-lab/pfc-attractor"
abstract: >
  We characterize the geometry of working memory representations in prefrontal cortex using
  high-density Neuropixels recordings during a delayed-match-to-sample task. We find that
  persistent activity during the delay period lies on a low-dimensional ring attractor,
  consistent with continuous attractor network models. The ring's orientation in state space
  predicts memory accuracy on individual trials, providing a geometric readout of memory fidelity.
