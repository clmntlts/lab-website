abstract: >
  Neural population activity lives on low-dimensional manifolds embedded in high-dimensional state spaces.
  We develop a Riemannian geometric framework for analyzing these manifolds that respects the intrinsic
  curvature of neural representations. Applied to recordings from macaque visual and motor cortex,
  we show that the curvature of neural manifolds predicts behavioral performance and generalizes
  across tasks. Our framework provides new tools for comparing representations across brain areas,
  species, and artificial neural networks.
